name: 1️⃣ Sync Sake Data (每天同步資料)
# ============================================================
# 用途:每天從 Sakenowa API 抓最新酒造資料,跑 AI 生成內容,
#       重建 HTML,然後 push 回 repo。
#
# 排程:每天台灣時間 22:00 (晚上 10 點) 自動跑一次
# 手動:Actions > Sync Sake Data > Run workflow
# 耗時:5-15 分鐘 (視是否抓規格 / AI 生成)
#
# 何時要手動跑這個:
#   - 你想立刻抓 Sakenowa 最新資料
#   - 你新增了 featured_breweries.txt / featured_brands.txt 想立即套用
#   - 你要 AI 生成更多介紹文
#
# ❌ 不要為了改模板 / CSS 而跑這個 → 改用 Deploy 那個 workflow
# ============================================================

on:
  schedule:
    # 每天 UTC 14:00 = 台灣時間 22:00 (晚上 10 點)
    - cron: "0 14 * * *"
  workflow_dispatch:
    inputs:
      skip_specs:
        description: "跳過抓酒造官網規格 (省 ~1 分鐘)"
        required: false
        type: boolean
        default: false
      skip_content:
        description: "跳過 AI 生成內容 (省 5-10 分鐘,而且省錢)"
        required: false
        type: boolean
        default: false
      skip_publish:
        description: "跳過發布到 WordPress (預設跳過)"
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ===== Step 1: 抓 Sakenowa API =====
      - name: Fetch Sakenowa API
        run: python scripts/fetch_sakenowa.py

      # ===== Step 2: 正規化資料 =====
      - name: Normalize data
        run: python scripts/normalize.py --mode all

      # ===== Step 3: (可選) 抓酒造官網規格 =====
      - name: Fetch brewery specs
        if: ${{ !inputs.skip_specs }}
        run: python scripts/fetch_brewery_specs.py --max 50
        continue-on-error: true

      # ===== Step 4: (可選) Claude API 生成內容 =====
      - name: Generate content with Claude
        if: ${{ !inputs.skip_content && env.ANTHROPIC_API_KEY != '' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_content.py --max 300
        continue-on-error: true

      # ===== Step 5: 建置靜態網站 =====
      - name: Build static site
        run: python scripts/build_static_site.py --output-dir dist

      # ===== Step 6: (可選) 發布到 WordPress =====
      - name: Publish to WordPress
        if: ${{ !inputs.skip_publish && env.WP_BASE_URL != '' }}
        env:
          WP_BASE_URL: ${{ secrets.WP_BASE_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: python scripts/publish_to_wordpress.py --status draft
        continue-on-error: true

      # ===== Step 7: Commit 資料變更 =====
      - name: Commit data changes
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes to commit"
            exit 0
          fi
          git commit -m "data: daily sync $(date -u +%Y-%m-%d)"

          for i in 1 2 3; do
            echo "Push attempt $i..."
            git pull --rebase origin main || echo "pull failed, continuing"
            if git push origin main; then
              echo "Push successful"
              exit 0
            fi
            sleep 5
          done
          echo "Push failed after 3 attempts, continuing"
          exit 0

      # ===== Step 8: 上傳資料 artifacts =====
      - name: Upload data artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sake-data-${{ github.run_number }}
          path: |
            data/breweries.csv
            data/breweries.json
            data/products.csv
            data/products.json
            data/products_with_content.csv
            data/products_with_content.json
            data/_match_report.txt
          retention-days: 30

      # ===== Step 9: 上傳網站 artifact 給 Pages 部署用 =====
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # ===== 部署到 GitHub Pages =====
  deploy:
    needs: sync
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
